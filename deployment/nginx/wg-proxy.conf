events {
    worker_connections 1024;
}

http {
    underscores_in_headers on;

    # Serve the CA certificate for device trust installation.
    # VPN-connected users visit http://10.13.13.1/rootca.crt to download it.
    server {
        listen 80;
        server_name 10.13.13.1;

        location /rootca.crt {
            alias /etc/nginx/ssl/server.crt;
            default_type application/x-x509-ca-cert;
        }

        location / {
            return 200 "Starpoint WireGuard server\n";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name na.wdfp.kakaogames.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name patch.wdfp.kakaogames.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            rewrite ^/(.*)$ /patch/$1 break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }
    }


}
