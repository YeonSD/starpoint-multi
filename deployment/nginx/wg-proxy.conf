events {
    worker_connections 1024;
}

http {
    underscores_in_headers on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Serve the root CA certificate for device trust installation.
    # VPN-connected users visit http://10.13.13.1/rootca.crt to download it.
    server {
        listen 80;
        server_name 10.13.13.1;

        location /rootca.crt {
            alias /etc/nginx/ssl/rootca.crt;
            default_type application/x-x509-ca-cert;
        }

        location / {
            return 200 "Starpoint WireGuard server\n";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name na.wdfp.kakaogames.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_connect_timeout 10;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name patch.wdfp.kakaogames.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            proxy_pass http://127.0.0.1:8000/patch/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_connect_timeout 10;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name gc-openapi-zinny3.kakaogames.com openapi-zinny3.game.kakao.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            proxy_pass http://127.0.0.1:8000/openapi/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_connect_timeout 10;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
        }
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name gc-infodesk-zinny3.kakaogames.com;
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            proxy_pass http://127.0.0.1:8000/infodesk/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_pass_request_headers on;
            proxy_connect_timeout 10;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
        }
    }
}
