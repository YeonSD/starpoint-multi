services:
  wireguard:
    build:
      context: .
      dockerfile: deployment/wireguard-dnsmasq.Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      STARPOINT_WG_NETWORK: ${STARPOINT_WG_NETWORK:-10.13.13.0/24}
      STARPOINT_WG_SERVER_ADDRESS: ${STARPOINT_WG_SERVER_ADDRESS:-10.13.13.1/24}
      STARPOINT_WG_PORT: ${STARPOINT_WG_PORT:-51820}
      STARPOINT_DNS_UPSTREAM: ${STARPOINT_DNS_UPSTREAM:-1.1.1.1}
    ports:
      - "80:80"
      - "443:443"
      - "8000:8000"
      - "51820:51820/udp"
    volumes:
      - ./.generated/wireguard:/config

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: ["/bin/sh", "-c", "until [ -f /etc/nginx/ssl/server.crt ]; do sleep 1; done; exec nginx -g 'daemon off;'"]
    volumes:
      - ./.generated/wireguard/ssl:/etc/nginx/ssl:ro
      - ./deployment/nginx/wg-proxy.conf:/etc/nginx/nginx.conf:ro

  starpoint:
    build: .
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    environment:
      TZ: ${TZ:-Asia/Seoul}
      CDN_DIR: /app/.cdn
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8000
      STARPOINT_PUBLIC_HOST: ${STARPOINT_PUBLIC_HOST:-localhost:8000}
      STARPOINT_MULTI_HOST: ${STARPOINT_MULTI_HOST:-10.13.13.1}
      STARPOINT_MULTI_PORT: 18888
      STARPOINT_WG_NETWORK: ${STARPOINT_WG_NETWORK:-10.13.13.0/24}
      STARPOINT_WG_SERVER_ADDRESS: ${STARPOINT_WG_SERVER_ADDRESS:-10.13.13.1/24}
      STARPOINT_WG_DNS: ${STARPOINT_WG_DNS:-10.13.13.1}
      STARPOINT_WG_ENDPOINT_HOST: ${STARPOINT_WG_ENDPOINT_HOST:-127.0.0.1}
      STARPOINT_WG_PORT: ${STARPOINT_WG_PORT:-51820}
      STARPOINT_INTERNAL_TOKEN: ${STARPOINT_INTERNAL_TOKEN:-starpoint-internal}
      STARPOINT_DUMMY_MULTI_RESPONSE_MODE: accept_array_params
      STARPOINT_DUMMY_MULTI_SKIP_EARLY_BATTLE_START: "1"
      STARPOINT_DUMMY_MULTI_ACCEPT_ROOM_NUMBER: "1"
    volumes:
      - ./.cdn:/app/.cdn
      - ./.database:/app/.database
      - ./.generated:/app/.generated

  realtime:
    build: .
    restart: unless-stopped
    working_dir: /app
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
      - starpoint
    environment:
      TZ: ${TZ:-Asia/Seoul}
      STARPOINT_MULTI_PORT: 18888
      STARPOINT_DUMMY_MULTI_SKIP_EARLY_BATTLE_START: "1"
      STARPOINT_DUMMY_MULTI_RESPONSE_MODE: accept_array_params
      STARPOINT_DUMMY_MULTI_ACCEPT_ROOM_NUMBER: "1"
      STARPOINT_HTTP_BASE: http://127.0.0.1:8000
      STARPOINT_INTERNAL_TOKEN: ${STARPOINT_INTERNAL_TOKEN:-starpoint-internal}
    command: ["node", "scripts/dummy-multi-server.js"]
    volumes:
      - ./.logs:/app/.logs
